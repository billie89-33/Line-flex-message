<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Line Flex Message application">
    <title>Line Flex Message App</title>
    
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base styles with premium feel */
        :root {
            --line-green: #06C755;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, hsla(140, 100%, 85%, 0.4) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, hsla(210, 100%, 85%, 0.4) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .glass-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: var(--line-green);
            font-weight: 700;
            margin-top: 0;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            background-color: var(--line-green);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #05a847;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>Line Flex Message</h1>
        <p>Your workspace is ready. This is a modern, responsive HTML boilerplate tailored for high-quality UI development.</p>
        <button class="btn" id="action-btn">Get Started</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const actionBtn = document.getElementById('action-btn');
            
            // สร้างส่วนแสดงสถานะด้านล่างปุ่ม
            const statusText = document.createElement('p');
            statusText.style.marginTop = '15px';
            statusText.style.fontWeight = 'bold';
            actionBtn.parentNode.appendChild(statusText);
            
            actionBtn.addEventListener('click', async () => {
                // เปลี่ยนสถานะปุ่มตอนกำลังโหลด
                const originalText = actionBtn.textContent;
                actionBtn.textContent = 'กำลังส่งข้อความ...';
                actionBtn.style.backgroundColor = '#0f172a';
                actionBtn.disabled = true;
                statusText.textContent = '';

                try {
                    // ยิง Request ไปยัง Backend (Node.js) ของเรา
                    const response = await fetch('http://localhost:3000/send-flex', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        statusText.textContent = '✅ ส่ง Flex Message สำเร็จ! เช็คใน LINE ได้เลย';
                        statusText.style.color = '#06C755';
                    } else {
                        console.error(result.error);
                        statusText.textContent = '❌ เกิดข้อผิดพลาด (ดูรายละเอียดใน Console)';
                        statusText.style.color = '#ef4444';
                    }
                } catch (error) {
                    console.error(error);
                    statusText.textContent = '❌ ไม่สามารถเชื่อมต่อกับ Backend ได้ (เปิดรัน Server หรือยัง?)';
                    statusText.style.color = '#ef4444';
                } finally {
                    // รีเซ็ตปุ่มกลับมาเหมือนเดิม
                    setTimeout(() => {
                        actionBtn.textContent = originalText;
                        actionBtn.style.backgroundColor = 'var(--line-green)';
                        actionBtn.disabled = false;
                    }, 3000);
                }
            });
        });
    </script>
</body>
</html>
